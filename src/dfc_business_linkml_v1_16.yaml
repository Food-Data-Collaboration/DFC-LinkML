    - string
    domain:
    - DeliveryOption
  description:
    description: 'Data property from OWL: description'
    range:
    - string
    domain:
    - DFC_BusinessOntology_Subject
  discount:
    description: Any discount applied to the Price
    range:
    - float
    domain:
    - OrderLine
    - Order
    - Offer
  email:
    description: email address of the Agent
    range:
    - string
    domain:
    - Agent
  end_date:
    description: The date/time that the Sales Session ends
    range:
    - datetime
    domain:
    - ShippingOption
    - Shipment
    - AsRealizedTransformation
    - AsPlannedLocalTransformation
    - SaleSession
