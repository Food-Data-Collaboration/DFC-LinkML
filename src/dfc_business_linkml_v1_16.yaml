    description: 'Data property from OWL: enterpriseID'
    range:
    - string
    domain:
    - Enterprise
  expiry_date:
    description: 'Data property from OWL: expiryDate'
    range:
    - date
    domain:
    - ProductBatch
  extra_availability_time:
    description: Additional lead time for catalog item. To be appended to AvailabilityTime
    range:
    - string
    domain:
    - CatalogItem
  extra_delivery_condition:
    description: Additional devilery conditions for this item (append to any Devliery Condition set at Product level)
    range:
    - string
    domain:
    - CatalogItem
  family_name:
    description: Family name or surname of Person
    range:
    - string
    domain:
    - Person
  fee:
    description: The value of any fee associated with the Shipping Option
    range:
    - float
    domain:
    - ShippingOption
  first_name:
    description: First name of Person
    range:
    - string
    domain:
    - Person
  frozen:
    description: Defines if the parent class supports or requires refrigeration to a safe temperature to maintain frozen products.
    range:
    - boolean
    domain:
    - SuppliedProduct
    - Vehicle
  has_percentage_of_alcohol_by_volume:
    description: Percentage of Alcohol (by volume) in the Product, expressed as a number in the range 0.00 - 100.00
    range:
    - float
    domain:
    - DefinedProduct
  invoice_number:
    description: 'Data property from OWL: invoiceNumber'
    range:
    - string
    domain:
    - Transaction
  latitude:
    description: numeric latitude of the Address location
    range:
    - float
    domain:
    - Address
  lifetime:
    description: Lifetime of the product (in days), expressed as a number
    range:
    - float
    domain:
    - DefinedProduct
  logo:
    description: URI to logo of Agent
    range:
    - uri
    domain:
    - Agent
  longitude:
    description: numeric longitude of the Address location
    range:
    - float
    domain:
    - Address
  margin_percent:
    description: The percentage margin the coordinating Enterprise is charging as comission for managing the Sales Session (from 0-100%)
    range:
    - float
    domain:
    - Coordination
  max_value:
    description: 'Data property from OWL: maxValue'
    range:
    - string
    domain: []
  min_value:
    description: 'Data property from OWL: minValue'
    range:
    - string
    domain: []
  name:
    description: Name of the Enterprise
    range:
    - string
    domain:
    - DFC_BusinessOntology_Subject
  order_number:
    description: The Order Number on the parent platform
    range:
    - string
    domain:
    - Order
  payment_method_provider:
    description: 'Data property from OWL: paymentMethodProvider'
    range:
    - string
    domain:
    - PaymentMethod
  payment_method_type:
    description: 'Data property from OWL: paymentMethodType'
    range:
    - string
    domain:
    - PaymentMethod
  phone_number:
    description: The full phone number (not including any country code)
    range:
    - string
    domain:
    - PhoneNumber
  physical_characteristics:
    description: " **Deprecated** \nAny Physical Characteristics of a Product. \n**Deprecated**"
    range:
    - string
    domain:
    - DefinedProduct
  postcode:
    description: The code defined by the relevant authority that facilitates mail delivery to that address
    range:
    - string
    domain:
    - Address
  production_date:
    description: 'Data property from OWL: productionDate'
    range:
    - date
    domain:
    - ProductBatch
  quantity:
    description: DEPRECATE
    range:
    - float
    domain:
    - ShippingOption
    - Stock
    - Transaction
    - ProductionFlow
    - ConsumptionFlow
    - DefinedProduct
    - LocalizedProduct
    - OrderLine
    - SaleSession
    - PhysicalProduct
  refrigerated:
    description: Defines if the parent class supports or requires refrigeration to a safe temperature to maintain refrigerated products (typically 0-5°C).
    range:
    - boolean
    domain:
    - SuppliedProduct
    - Vehicle
  region:
    description: The Region (adminstrative district below Country) the Address is located within
    range:
    - string
    domain:
    - Address
  sku:
    description: Only a general "SKU" id is proposed for now. Agents using GTIN could use GTIN as SKU but other IDs than GTIN can be used.
    range:
    - string
    domain:
