    range:
    - uri
    domain:
    - VirtualPlace
    - Agent
    - SocialMedia
  day_of_week:
    description: 'Data property from OWL: dayOfWeek'
    range:
    - string
    domain:
    - OpeningHoursSpecification
  opens:
    description: 'Data property from OWL: opens'
    range:
    - string
    domain:
    - OpeningHoursSpecification
  broader:
    description: 'Object property from OWL: broader'
    range:
    - string
    domain: []
  in_scheme:
    description: 'Object property from OWL: inScheme'
    range:
    - string
    domain: []
  narrower:
