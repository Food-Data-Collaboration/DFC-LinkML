    range:
    - uri
    domain:
    - LocalizedProduct
    - PhysicalProduct
    - DefinedProduct
  url:
    description: The Universal Resource Locator address of the virtual place
    range:
    - uri
    domain:
    - DefinedProduct
    - VirtualPlace
  vat_number:
    description: Any Tax Registration Number that is applicable to the Enterprise, in the jurisdiction the Enterprise is operating in.
    range:
    - string
    domain:
    - Enterprise
  vat_rate:
    description: The Sales Tax (VAT) rate associated with the Price, given as a percentage value from 0-100
    range:
    - float
    domain:
    - Price
  vat_status:
    description: Indicates whether the Enterprise charges VAT or not
    range:
    - boolean
    domain:
    - Enterprise
  accessibility_info:
    description: 'Data property from OWL: accessibilityInfo'
    range:
    - string
    domain:
    - DeliveryOption
  availability_date:
    description: '"The date from which the product is available from the information provider, including seasonal or temporary product and services." (source : GS1 model)'
    range:
    - string
    domain:
    - Stock
  availability_time:
    description: Lead time for supplying the product.
    range:
    - string
    domain:
    - SuppliedProduct
  batch_number:
    description: 'Data property from OWL: batchNumber'
    range:
    - string
    domain:
    - ProductBatch
  best_before_date:
    description: '" à consommer de préférence avant le… " : après cette date, le produit peut perdre une partie ou la totalité de ses qualités sans présenter un danger pour la santé : par exemple le café
      peut perdre son arôme.'
    range:
    - date
    domain:
    - ProductBatch
  brand:
    description: Deprecated onto v5.0
    range:
    - string
    domain:
    - DefinedProduct
  city:
    description: The postal city (may be a town) that the address is located within
    range:
    - string
    domain:
    - Address
  claim:
